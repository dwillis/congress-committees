name: Check Congressional Record

# Runs daily around noon Eastern to poll for new House committee changes
# (resolutions + Congressional Record resignations). Opens an issue only
# when new events are found since the last successful check; otherwise
# the run ends without side effects.
on:
  schedule:
    # 16:00 UTC = noon EDT (roughly 1pm ET during EST winter months).
    - cron: '0 16 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

env:
  # Bump this when a new Congress is seated (120th starts January 2027).
  CONGRESS: 119

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Determine watermark
        id: watermark
        run: |
          if [ -f state/watermark.json ]; then
            SINCE=$(python3 -c "import json; print(json.load(open('state/watermark.json'))['since'])")
          else
            SINCE=$(date -u -d yesterday +%F)
          fi
          echo "since=$SINCE" >> "$GITHUB_OUTPUT"

      - name: Run congress-committees
        env:
          CONGRESS_GOV_API_KEY: ${{ secrets.CONGRESS_GOV_API_KEY }}
        run: |
          uv run congress-committees \
            --congress "$CONGRESS" \
            --since "${{ steps.watermark.outputs.since }}" \
            --out output/committee_changes.json \
            -v

      - name: Keep only genuinely new events
        run: |
          # congress.gov's bill `updateDate` (the server-side --since filter)
          # can be bumped by unrelated bulk metadata reprocessing well after a
          # resolution's actual action date, so --since can return events that
          # aren't actually new. Re-filter on each event's own `date` field.
          python3 .github/scripts/filter_since.py "${{ steps.watermark.outputs.since }}" \
            < output/committee_changes.json > output/new_events.json
          mv output/new_events.json output/committee_changes.json

      - name: Check for new events
        id: check
        run: |
          COUNT=$(python3 -c "import json; print(len(json.load(open('output/committee_changes.json'))))")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Found $COUNT new committee change event(s)."

      - name: Ensure label exists
        if: steps.check.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create committee-change \
            --color ededed \
            --description "New House committee change detected" \
            --force

      - name: Create issue for new committee changes
        if: steps.check.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # --body-file (not --body "$BODY") -- a large event count can make
          # the body exceed the shell's argument-list size limit ("Argument
          # list too long"), which --body "$VAR" hits but --body-file avoids.
          uv run python .github/scripts/format_issue_body.py \
            < output/committee_changes.json > /tmp/issue_body.md
          gh issue create \
            --title "Committee changes detected — $(date -u +%F)" \
            --body-file /tmp/issue_body.md \
            --label committee-change

      - name: Advance watermark
        if: steps.check.outputs.count != '0'
        run: |
          mkdir -p state
          NEXT=$(date -u -d tomorrow +%F)
          python3 -c "import json; json.dump({'since': '$NEXT'}, open('state/watermark.json', 'w'), indent=2)"
          echo "" >> state/watermark.json

      - name: Commit watermark update
        if: steps.check.outputs.count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/watermark.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: advance committee-change watermark"
          git push
